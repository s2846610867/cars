<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帅宝行名车 · 车源后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121316;--bg2:#17191e;--surface:#1d2026;--surface2:#23272f;--line:#2c3038;
    --ink:#f3f1ea;--ink-dim:#9aa0ab;--ink-faint:#646a76;
    --gold:#e3b04b;--green:#5fbf7a;--green-soft:rgba(95,191,122,.16);
    --amber:#e8a13a;--amber-soft:rgba(232,161,58,.16);--gray:#7a818d;--gray-soft:rgba(122,129,141,.16);
    --red:#e06a5a;
    --display:"Bricolage Grotesque",-apple-system,system-ui,sans-serif;
    --cjk:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--cjk);background:radial-gradient(1100px 600px at 85% -10%,rgba(227,176,75,.07),transparent 60%),radial-gradient(900px 500px at -5% 100%,rgba(95,140,191,.05),transparent 55%),var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 120px;}

  .conn{position:sticky;top:0;z-index:30;margin:0 -16px;border-bottom:1px solid var(--line);font-size:12.5px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .conn.ok{background:linear-gradient(90deg,#10231a,#0f2018);color:var(--green);}
  .conn.off{background:linear-gradient(90deg,#241310,#201210);color:var(--red);}
  .conn .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;}
  .conn.ok .dot{background:var(--green);box-shadow:0 0 8px var(--green);}
  .conn.off .dot{background:var(--red);}
  .conn button{background:none;border:1px solid currentColor;color:inherit;border-radius:7px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:var(--cjk);opacity:.85;}
  .conn button:hover{opacity:1;}

  header{padding:26px 4px 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .brand{display:flex;flex-direction:column;gap:3px;}
  .brand .ey{font-size:11px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;font-family:var(--display);font-weight:700;}
  .brand h1{font-size:23px;font-weight:800;letter-spacing:-.01em;}
  .brand h1 b{color:var(--gold);}

  .stats{display:flex;gap:8px;margin:6px 4px 20px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;}
  .stat .n{font-family:var(--display);font-size:26px;font-weight:800;line-height:1;}
  .stat .l{font-size:12px;color:var(--ink-dim);margin-top:6px;}
  .stat.s-on .n{color:var(--green);}.stat.s-rsv .n{color:var(--amber);}.stat.s-sold .n{color:var(--gray);}

  .addbar{display:flex;align-items:center;justify-content:space-between;margin:0 4px 14px;}
  .addbar .ttl{font-size:14px;color:var(--ink-dim);font-weight:600;}
  .btn{font-family:var(--cjk);cursor:pointer;border:none;border-radius:11px;font-weight:700;font-size:14px;transition:transform .12s,filter .15s;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:#231c08;padding:11px 18px;display:inline-flex;align-items:center;gap:7px;}
  .btn-gold:hover{filter:brightness(1.06);}
  .btn-gold svg{width:16px;height:16px;}

  .grid{display:flex;flex-direction:column;gap:14px;}
  .car{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;transition:border-color .18s;}
  .car:hover{border-color:#3a404b;}.car.sold{opacity:.62;}
  .car .ph{width:138px;min-width:138px;background:var(--bg2);position:relative;background-size:cover;background-position:center;}
  .car .ph.empty{display:flex;align-items:center;justify-content:center;color:var(--ink-faint);}
  .car .ph.empty svg{width:30px;height:30px;opacity:.5;}
  .badge{position:absolute;top:9px;left:9px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;backdrop-filter:blur(4px);}
  .badge.on{background:var(--green-soft);color:var(--green);border:1px solid rgba(95,191,122,.3);}
  .badge.rsv{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(232,161,58,.3);}
  .badge.sold{background:var(--gray-soft);color:var(--gray);border:1px solid rgba(122,129,141,.3);}
  .car .body{flex:1;padding:13px 14px;display:flex;flex-direction:column;min-width:0;}
  .car .name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:7px;}
  .car .specs{display:flex;flex-wrap:wrap;gap:5px 7px;margin-bottom:auto;}
  .spec{font-size:11.5px;color:var(--ink-dim);background:var(--surface2);padding:2px 8px;border-radius:6px;}
  .car .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;gap:8px;}
  .price{font-family:var(--display);font-weight:800;color:var(--gold);font-size:20px;}
  .price small{font-size:12px;color:var(--ink-dim);font-weight:500;margin-left:2px;}
  .acts{display:flex;gap:6px;}
  .icbtn{width:31px;height:31px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--ink-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;}
  .icbtn:hover{color:var(--ink);border-color:#3a404b;}
  .icbtn.del:hover{color:var(--red);border-color:rgba(224,106,90,.4);}
  .icbtn svg{width:15px;height:15px;}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(8,9,11,.72);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:6px 20px 28px;animation:rise .26s cubic-bezier(.2,.8,.2,1);}
  @media(min-width:600px){.overlay{align-items:center;}.sheet{border-radius:22px;}}
  @keyframes rise{from{transform:translateY(40px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:10px auto 16px;}
  .sheet h2{font-size:18px;font-weight:800;margin-bottom:2px;}
  .sheet .sub{font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-dim);margin-bottom:6px;font-weight:600;}
  .field label .opt{color:var(--ink-faint);font-weight:400;}
  .field input,.field select,.field textarea{width:100%;font-family:var(--cjk);font-size:15px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;transition:border-color .14s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
  .field textarea{resize:vertical;min-height:64px;}
  .row2{display:flex;gap:11px;}.row2>.field{flex:1;}
  .seg{display:flex;gap:6px;}
  .seg button{flex:1;font-family:var(--cjk);font-size:13.5px;font-weight:700;cursor:pointer;padding:9px 0;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink-dim);transition:all .14s;}
  .seg button.act-on{background:var(--green-soft);color:var(--green);border-color:rgba(95,191,122,.4);}
  .seg button.act-rsv{background:var(--amber-soft);color:var(--amber);border-color:rgba(232,161,58,.4);}
  .seg button.act-sold{background:var(--gray-soft);color:var(--ink);border-color:rgba(122,129,141,.5);}
  .photos{display:flex;flex-wrap:wrap;gap:9px;}
  .thumb{width:74px;height:74px;border-radius:11px;background:var(--surface2);background-size:cover;background-position:center;position:relative;border:1px solid var(--line);}
  .thumb .cov{position:absolute;bottom:3px;left:3px;font-size:9.5px;font-weight:700;background:var(--gold);color:#231c08;padding:1px 6px;border-radius:5px;}
  .thumb .x{position:absolute;top:-7px;right:-7px;width:21px;height:21px;border-radius:50%;background:var(--red);color:#fff;border:2px solid var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;}
  .thumb.setcov{cursor:pointer;}
  .addph{width:74px;height:74px;border-radius:11px;border:1.5px dashed var(--line);background:transparent;color:var(--ink-faint);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;transition:all .14s;}
  .addph:hover{border-color:var(--gold);color:var(--gold);}
  .addph svg{width:19px;height:19px;}
  .hint{font-size:11.5px;color:var(--ink-faint);margin-top:8px;line-height:1.5;}
  .savebar{display:flex;gap:11px;margin-top:24px;}
  .btn-ghost{flex:0 0 auto;background:var(--surface);color:var(--ink-dim);border:1px solid var(--line);padding:13px 20px;}
  .btn-ghost:hover{color:var(--ink);}
  .btn-save{flex:1;background:var(--gold);color:#231c08;padding:13px;}
  .btn-save:hover{filter:brightness(1.06);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);font-weight:700;font-size:14px;padding:12px 22px;border-radius:12px;z-index:99;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.ok{background:var(--green);color:#0c2113;}.toast.err{background:var(--red);color:#2b0f0b;}
  .empty-list{text-align:center;padding:60px 0;color:var(--ink-faint);}
  .empty-list svg{width:42px;height:42px;opacity:.4;margin-bottom:12px;}

  /* settings */
  .set-grp{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:4px 14px;margin-bottom:16px;}
  .tokenrow{display:flex;gap:8px;}
  .tokenrow input{flex:1;}
  .warnbox{background:rgba(232,161,58,.1);border:1px solid rgba(232,161,58,.3);border-radius:11px;padding:11px 13px;font-size:12px;color:#f0cf8e;line-height:1.55;margin-bottom:16px;}
  .warnbox b{color:var(--amber);}
</style>
</head>
<body>
<div class="conn off" id="conn">
  <span><span class="dot"></span><span id="connText">未连接 · 点右边填入你的设置</span></span>
  <button onclick="openSettings()">设置</button>
</div>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="ey">SHUAIBAOHANG</span>
      <h1>帅宝行<b>名车</b> · 车源后台</h1>
    </div>
    <button class="btn btn-gold" onclick="openForm()" id="addBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      添加车辆
    </button>
  </header>
  <div class="stats">
    <div class="stat s-on"><div class="n" id="stOn">0</div><div class="l">在售</div></div>
    <div class="stat s-rsv"><div class="n" id="stRsv">0</div><div class="l">已订</div></div>
    <div class="stat s-sold"><div class="n" id="stSold">0</div><div class="l">已售</div></div>
  </div>
  <div class="addbar"><span class="ttl">当前车源</span></div>
  <div class="grid" id="grid"><div class="empty-list">填好设置并连接后，这里会显示你的车源</div></div>
</div>

<!-- car form -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="grab"></div>
    <h2 id="formTitle">添加车辆</h2>
    <div class="sub">填好资料 → 选照片 → 保存，几秒后线上站自动更新</div>
    <div class="field"><label>车型全称</label><input id="fName" placeholder="奔驰 GLC260L 4MATIC 动感型"></div>
    <div class="row2">
      <div class="field"><label>上牌时间</label><input id="fYear" placeholder="2019年6月"></div>
      <div class="field"><label>表显里程 <span class="opt">万公里</span></label><input id="fKm" type="number" step="0.1" placeholder="6.8"></div>
    </div>
    <div class="row2">
      <div class="field"><label>排量</label><input id="fDisp" placeholder="2.0T"></div>
      <div class="field"><label>变速箱</label><input id="fGear" placeholder="9挡手自一体"></div>
    </div>
    <div class="row2">
      <div class="field"><label>排放标准</label><input id="fEmission" placeholder="国六"></div>
      <div class="field"><label>车身颜色</label><input id="fColor" placeholder="黑色"></div>
    </div>
    <div class="row2">
      <div class="field"><label>过户次数</label><input id="fTransfer" type="number" placeholder="1"></div>
      <div class="field"><label>价格 <span class="opt">万元</span></label><input id="fPrice" type="number" step="0.1" placeholder="23.8"></div>
    </div>
    <div class="field"><label>状态</label>
      <div class="seg" id="segStatus">
        <button data-s="on" onclick="setStatus('on')">在售</button>
        <button data-s="rsv" onclick="setStatus('rsv')">已订</button>
        <button data-s="sold" onclick="setStatus('sold')">已售</button>
      </div>
    </div>
    <div class="field"><label>亮点描述 <span class="opt">选填</span></label><textarea id="fNote" placeholder="一手个人车，全程4S保养，无事故无泡水..."></textarea></div>
    <div class="field">
      <label>照片 <span class="opt">第一张为封面，点其它图设为封面</span></label>
      <div class="photos" id="photos"></div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">
      <div class="hint">选图后会自动压缩（约1200px宽）再上传，不会撑爆仓库。</div>
    </div>
    <div class="savebar">
      <button class="btn btn-ghost" onclick="closeForm()">取消</button>
      <button class="btn btn-save" id="saveBtn" onclick="saveCar()">保存到线上</button>
    </div>
  </div>
</div>

<!-- settings -->
<div class="overlay" id="setOverlay">
  <div class="sheet">
    <div class="grab"></div>
    <h2>连接设置</h2>
    <div class="sub">填一次就行，存在你这台设备的浏览器里</div>
    <div class="warnbox">
      🔑 <b>Token 是一把能改你仓库的钥匙。</b>只填在这一个页面里，<b>千万别截图发给任何人</b>（包括发到聊天里）、别在别人电脑上填。
    </div>
    <div class="set-grp">
      <div class="row2">
        <div class="field"><label>GitHub 用户名</label><input id="sOwner" placeholder="s2846610867"></div>
        <div class="field"><label>仓库名</label><input id="sRepo" placeholder="cars"></div>
      </div>
      <div class="row2">
        <div class="field"><label>分支</label><input id="sBranch" placeholder="main"></div>
        <div class="field"><label>数据文件</label><input id="sData" placeholder="cars.json"></div>
      </div>
      <div class="field"><label>图片目录</label><input id="sPics" placeholder="pics"></div>
    </div>
    <div class="field">
      <label>访问令牌 Token</label>
      <div class="tokenrow">
        <input id="sToken" type="password" placeholder="github_pat_...">
        <button class="btn btn-ghost" style="padding:11px 14px" onclick="togTok()" id="togBtn">显示</button>
      </div>
    </div>
    <div class="savebar">
      <button class="btn btn-ghost" onclick="$('#setOverlay').classList.remove('show')">关闭</button>
      <button class="btn btn-save" onclick="saveSettings()">保存并测试连接</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- 进入密码（把 MYPASSWORD 改成你的真实密码，两边引号保留）----
  (function(){
    var GATE='shuaibaohang222';
    var ok=false; try{ ok=sessionStorage.getItem('gate')===GATE; }catch(e){}
    if(!ok){
      var pw=prompt('请输入管理密码');
      if(pw!==GATE){
        document.body.innerHTML="<p style='color:#888;text-align:center;margin-top:42vh;font-family:sans-serif'>密码错误，请刷新重试</p>";
        throw new Error('locked');
      }
      try{ sessionStorage.setItem('gate',GATE); }catch(e){}
    }
  })();

  const $ = s => document.querySelector(s);
  // ---- safe storage (works on Pages; falls back to memory in restricted previews) ----
  const mem = {};
  const store = {
    get:k=>{try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}},
    set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}},
  };
  let cfg = {owner:"",repo:"",branch:"main",data:"cars.json",pics:"pics",token:""};
  try{const s=store.get("cfg"); if(s) cfg={...cfg,...JSON.parse(s)};}catch(e){}

  let cars=[], dataSha=null, connected=false;
  let editingId=null, formStatus="on", formPhotos=[];
  const statusMap={on:{cls:"on",label:"在售"},rsv:{cls:"rsv",label:"已订"},sold:{cls:"sold",label:"已售"}};

  function api(path, opts={}){
    return fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${path}`,{
      ...opts,
      headers:{Authorization:`Bearer ${cfg.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json",...(opts.headers||{})}
    });
  }
  // utf-8 safe base64
  const b64enc = str => btoa(unescape(encodeURIComponent(str)));
  const b64dec = b => decodeURIComponent(escape(atob(b)));

  function setConn(ok,text){
    connected=ok;
    const c=$("#conn"); c.className="conn "+(ok?"ok":"off");
    $("#connText").textContent=text;
    $("#addBtn").disabled=!ok;
  }

  async function connect(){
    if(!cfg.owner||!cfg.repo||!cfg.token){ setConn(false,"未连接 · 点右边填入你的设置"); return; }
    setConn(false,"连接中…");
    try{
      const r=await api(`contents/${cfg.data}?ref=${cfg.branch}`);
      if(r.status===200){
        const j=await r.json(); dataSha=j.sha;
        cars=JSON.parse(b64dec(j.content));
      } else if(r.status===404){
        dataSha=null; cars=[]; // file not yet created, fine
      } else if(r.status===401){
        setConn(false,"Token 无效或已过期"); return;
      } else if(r.status===404){
        setConn(false,"找不到仓库，检查用户名/仓库名"); return;
      } else { setConn(false,"连接失败 ("+r.status+")"); return; }
      setConn(true,`已连接 · ${cfg.owner}/${cfg.repo} · 共 ${cars.length} 台`);
      render();
    }catch(e){ setConn(false,"网络错误，检查设置或网络"); }
  }

  function render(){
    const g=$("#grid");
    $("#stOn").textContent=cars.filter(c=>c.status==="on").length;
    $("#stRsv").textContent=cars.filter(c=>c.status==="rsv").length;
    $("#stSold").textContent=cars.filter(c=>c.status==="sold").length;
    if(cars.length===0){ g.innerHTML=`<div class="empty-list">还没有车，点右上角「添加车辆」</div>`; return; }
    const base=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/`;
    g.innerHTML=cars.map(c=>{
      const st=statusMap[c.status]||statusMap.on;
      const cover=c.photos&&c.photos[0]?base+c.photos[0]:null;
      const ph=cover?`<div class="ph" style="background-image:url('${cover}')"><span class="badge ${st.cls}">${st.label}</span></div>`
        :`<div class="ph empty"><span class="badge ${st.cls}">${st.label}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.5"/><path d="m21 16-5-5L5 19"/></svg></div>`;
      const specs=[c.year,c.km?c.km+"万公里":"",c.disp,c.gear,c.transfer!==""&&c.transfer!=null?"过户"+c.transfer+"次":""].filter(Boolean).map(s=>`<span class="spec">${s}</span>`).join("");
      return `<div class="car ${c.status==='sold'?'sold':''}">${ph}<div class="body"><div class="name">${c.name||"未命名"}</div><div class="specs">${specs}</div><div class="foot"><div class="price">${c.price||"—"}<small>万</small></div><div class="acts"><button class="icbtn" onclick="openForm('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button><button class="icbtn del" onclick="delCar('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button></div></div></div></div>`;
    }).join("");
  }

  function setStatus(s){formStatus=s;document.querySelectorAll("#segStatus button").forEach(b=>b.className=b.dataset.s===s?"act-"+s:"");}

  function openForm(id){
    editingId=id??null; formPhotos=[];
    const base=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/`;
    if(id){
      const c=cars.find(x=>String(x.id)===String(id));
      $("#formTitle").textContent="编辑车辆";
      $("#fName").value=c.name||"";$("#fYear").value=c.year||"";$("#fKm").value=c.km||"";
      $("#fDisp").value=c.disp||"";$("#fGear").value=c.gear||"";$("#fTransfer").value=c.transfer||"";
      $("#fPrice").value=c.price||"";$("#fEmission").value=c.emission||"";$("#fColor").value=c.color||"";
      $("#fNote").value=c.note||"";
      formPhotos=(c.photos||[]).map(p=>({type:"existing",path:p,url:base+p}));
      setStatus(c.status||"on");
    }else{
      $("#formTitle").textContent="添加车辆";
      ["fName","fYear","fKm","fDisp","fGear","fTransfer","fPrice","fEmission","fColor","fNote"].forEach(k=>$("#"+k).value="");
      setStatus("on");
    }
    renderPhotos(); $("#overlay").classList.add("show");
  }
  function closeForm(){$("#overlay").classList.remove("show");}

  function addPhotos(e){
    [...e.target.files].forEach(f=>compress(f,b=>{formPhotos.push({type:"new",...b});renderPhotos();}));
    e.target.value="";
  }
  // resize to max 1200px wide, jpeg ~0.72
  function compress(file,cb){
    const img=new Image(); const rd=new FileReader();
    rd.onload=e=>{img.onload=()=>{
      const max=1200; let{width:w,height:h}=img;
      if(w>max){h=Math.round(h*max/w);w=max;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const url=cv.toDataURL("image/jpeg",0.72);
      cb({url,base64:url.split(",")[1]});
    };img.src=e.target.result;};
    rd.readAsDataURL(file);
  }
  function renderPhotos(){
    const box=$("#photos");
    const add=`<button class="addph" onclick="document.getElementById('fileInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>加图</button>`;
    box.innerHTML=formPhotos.map((p,i)=>`<div class="thumb setcov" style="background-image:url('${p.url}')" onclick="makeCover(${i})">${i===0?'<span class="cov">封面</span>':''}<span class="x" onclick="event.stopPropagation();rmPhoto(${i})">×</span></div>`).join("")+add;
  }
  function makeCover(i){if(i===0)return;const[p]=formPhotos.splice(i,1);formPhotos.unshift(p);renderPhotos();}
  function rmPhoto(i){formPhotos.splice(i,1);renderPhotos();}

  async function putFile(path,contentB64,msg){
    // get existing sha if any
    let sha=null;
    const g=await api(`contents/${path}?ref=${cfg.branch}`);
    if(g.status===200){sha=(await g.json()).sha;}
    const body={message:msg,content:contentB64,branch:cfg.branch};
    if(sha)body.sha=sha;
    const r=await api(`contents/${path}`,{method:"PUT",body:JSON.stringify(body)});
    if(!r.ok)throw new Error("写入失败 "+path+" ("+r.status+")");
    return r;
  }

  async function saveCar(){
    if(!$("#fName").value.trim()){toast("先填车型全称","err");return;}
    const btn=$("#saveBtn"); btn.disabled=true; const orig=btn.textContent;
    try{
      const id=editingId||("c"+Date.now());
      // 1) upload new photos
      const ts=Date.now(); const finalPhotos=[]; let ni=0;
      for(let i=0;i<formPhotos.length;i++){
        const p=formPhotos[i];
        if(p.type==="existing"){finalPhotos.push(p.path);continue;}
        const fn=`${cfg.pics}/${id}-${ts}-${ni++}.jpg`;
        btn.textContent=`上传图片 ${ni}…`;
        await putFile(fn,p.base64,`add photo ${fn}`);
        finalPhotos.push(fn);
      }
      // 2) build car record
      const rec={id,name:$("#fName").value.trim(),year:$("#fYear").value.trim(),km:$("#fKm").value.trim(),
        disp:$("#fDisp").value.trim(),gear:$("#fGear").value,transfer:$("#fTransfer").value.trim(),
        price:$("#fPrice").value.trim(),emission:$("#fEmission").value.trim(),color:$("#fColor").value.trim(),
        note:$("#fNote").value.trim(),status:formStatus,photos:finalPhotos};
      if(editingId){const i=cars.findIndex(x=>String(x.id)===String(editingId));cars[i]=rec;}
      else{cars.unshift(rec);}
      // 3) write cars.json (refresh sha first)
      btn.textContent="保存车源…";
      const g=await api(`contents/${cfg.data}?ref=${cfg.branch}`);
      if(g.status===200)dataSha=(await g.json()).sha; else dataSha=null;
      const body={message:`update ${cfg.data}`,content:b64enc(JSON.stringify(cars,null,2)),branch:cfg.branch};
      if(dataSha)body.sha=dataSha;
      const r=await api(`contents/${cfg.data}`,{method:"PUT",body:JSON.stringify(body)});
      if(!r.ok)throw new Error("保存失败 ("+r.status+")");
      dataSha=(await r.json()).content.sha;
      closeForm();render();toast("已保存，约30秒后线上更新","ok");
    }catch(e){toast(e.message||"出错了","err");}
    finally{btn.disabled=false;btn.textContent=orig;}
  }

  async function delCar(id){
    const c=cars.find(x=>String(x.id)===String(id));
    if(!confirm(`确定删除「${c.name}」？（图片文件会保留在仓库，可忽略）`))return;
    const keep=cars.filter(x=>String(x.id)!==String(id));
    try{
      const g=await api(`contents/${cfg.data}?ref=${cfg.branch}`);
      const sha=g.status===200?(await g.json()).sha:null;
      const body={message:`remove car ${id}`,content:b64enc(JSON.stringify(keep,null,2)),branch:cfg.branch};
      if(sha)body.sha=sha;
      const r=await api(`contents/${cfg.data}`,{method:"PUT",body:JSON.stringify(body)});
      if(!r.ok)throw new Error("删除失败 ("+r.status+")");
      cars=keep;dataSha=(await r.json()).content.sha;render();toast("已删除","ok");
    }catch(e){toast(e.message,"err");}
  }

  // settings
  function openSettings(){
    $("#sOwner").value=cfg.owner;$("#sRepo").value=cfg.repo;$("#sBranch").value=cfg.branch;
    $("#sData").value=cfg.data;$("#sPics").value=cfg.pics;$("#sToken").value=cfg.token;
    $("#setOverlay").classList.add("show");
  }
  function togTok(){const i=$("#sToken");const b=$("#togBtn");if(i.type==="password"){i.type="text";b.textContent="隐藏";}else{i.type="password";b.textContent="显示";}}
  function saveSettings(){
    cfg={owner:$("#sOwner").value.trim()||"s2846610867",repo:$("#sRepo").value.trim()||"cars",
      branch:$("#sBranch").value.trim()||"main",data:$("#sData").value.trim()||"cars.json",
      pics:$("#sPics").value.trim()||"pics",token:$("#sToken").value.trim()};
    store.set("cfg",JSON.stringify(cfg));
    $("#setOverlay").classList.remove("show");
    connect();
  }

  let toastTimer;
  function toast(msg,kind){const t=$("#toast");t.textContent=msg;t.className="toast show "+(kind||"ok");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400);}

  $("#overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeForm();});
  $("#setOverlay").addEventListener("click",e=>{if(e.target.id==="setOverlay")$("#setOverlay").classList.remove("show");});

  // boot
  if(cfg.token&&cfg.owner&&cfg.repo){connect();}else{setConn(false,"未连接 · 点右边填入你的设置");}
</script>
</body>
</html>
