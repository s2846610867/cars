<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帅宝行名车 · 车源后台（演示）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121316;
    --bg2:#17191e;
    --surface:#1d2026;
    --surface2:#23272f;
    --line:#2c3038;
    --ink:#f3f1ea;
    --ink-dim:#9aa0ab;
    --ink-faint:#646a76;
    --gold:#e3b04b;
    --gold-soft:rgba(227,176,75,.14);
    --green:#5fbf7a;
    --green-soft:rgba(95,191,122,.16);
    --amber:#e8a13a;
    --amber-soft:rgba(232,161,58,.16);
    --gray:#7a818d;
    --gray-soft:rgba(122,129,141,.16);
    --red:#e06a5a;
    --display:"Bricolage Grotesque",-apple-system,system-ui,sans-serif;
    --cjk:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--cjk);
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(227,176,75,.07), transparent 60%),
      radial-gradient(900px 500px at -5% 100%, rgba(95,140,191,.05), transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 120px;}

  /* demo banner */
  .demo{
    position:sticky;top:0;z-index:30;
    margin:0 -16px;
    background:linear-gradient(90deg,#2a2310,#241f12);
    border-bottom:1px solid var(--line);
    color:var(--gold);
    font-size:12.5px;letter-spacing:.02em;
    padding:8px 16px;text-align:center;
  }
  .demo b{color:#f4d488;font-weight:700;}

  /* header */
  header{padding:26px 4px 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .brand{display:flex;flex-direction:column;gap:3px;}
  .brand .ey{font-size:11px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;font-family:var(--display);font-weight:700;}
  .brand h1{font-family:var(--cjk);font-size:23px;font-weight:800;letter-spacing:-.01em;}
  .brand h1 b{color:var(--gold);}

  /* stats */
  .stats{display:flex;gap:8px;margin:6px 4px 20px;}
  .stat{
    flex:1;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;
  }
  .stat .n{font-family:var(--display);font-size:26px;font-weight:800;line-height:1;}
  .stat .l{font-size:12px;color:var(--ink-dim);margin-top:6px;}
  .stat.s-on .n{color:var(--green);}
  .stat.s-rsv .n{color:var(--amber);}
  .stat.s-sold .n{color:var(--gray);}

  /* add bar */
  .addbar{display:flex;align-items:center;justify-content:space-between;margin:0 4px 14px;}
  .addbar .ttl{font-size:14px;color:var(--ink-dim);font-weight:600;}
  .btn{
    font-family:var(--cjk);cursor:pointer;border:none;
    border-radius:11px;font-weight:700;font-size:14px;
    transition:transform .12s ease, filter .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-gold{background:var(--gold);color:#231c08;padding:11px 18px;display:inline-flex;align-items:center;gap:7px;}
  .btn-gold:hover{filter:brightness(1.06);}
  .btn-gold svg{width:16px;height:16px;}

  /* car card */
  .grid{display:flex;flex-direction:column;gap:14px;}
  .car{
    background:var(--surface);border:1px solid var(--line);
    border-radius:18px;overflow:hidden;
    display:flex;gap:0;
    transition:border-color .18s ease, transform .18s ease;
  }
  .car:hover{border-color:#3a404b;}
  .car.sold{opacity:.62;}
  .car .ph{
    width:138px;min-width:138px;background:var(--bg2);position:relative;
    background-size:cover;background-position:center;
  }
  .car .ph.empty{display:flex;align-items:center;justify-content:center;color:var(--ink-faint);}
  .car .ph.empty svg{width:30px;height:30px;opacity:.5;}
  .badge{
    position:absolute;top:9px;left:9px;
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;
    backdrop-filter:blur(4px);
  }
  .badge.on{background:var(--green-soft);color:var(--green);border:1px solid rgba(95,191,122,.3);}
  .badge.rsv{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(232,161,58,.3);}
  .badge.sold{background:var(--gray-soft);color:var(--gray);border:1px solid rgba(122,129,141,.3);}
  .car .body{flex:1;padding:13px 14px;display:flex;flex-direction:column;min-width:0;}
  .car .name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:7px;}
  .car .specs{display:flex;flex-wrap:wrap;gap:5px 7px;margin-bottom:auto;}
  .spec{font-size:11.5px;color:var(--ink-dim);background:var(--surface2);padding:2px 8px;border-radius:6px;}
  .car .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;gap:8px;}
  .price{font-family:var(--display);font-weight:800;color:var(--gold);font-size:20px;}
  .price small{font-size:12px;color:var(--ink-dim);font-weight:500;margin-left:2px;}
  .acts{display:flex;gap:6px;}
  .icbtn{
    width:31px;height:31px;border-radius:9px;border:1px solid var(--line);
    background:var(--surface2);color:var(--ink-dim);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .14s;
  }
  .icbtn:hover{color:var(--ink);border-color:#3a404b;}
  .icbtn.del:hover{color:var(--red);border-color:rgba(224,106,90,.4);}
  .icbtn svg{width:15px;height:15px;}

  /* modal */
  .overlay{
    position:fixed;inset:0;z-index:50;background:rgba(8,9,11,.72);
    backdrop-filter:blur(3px);display:none;
    align-items:flex-end;justify-content:center;
  }
  .overlay.show{display:flex;}
  .sheet{
    width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
    background:var(--bg2);border:1px solid var(--line);
    border-radius:22px 22px 0 0;
    padding:6px 20px 28px;
    animation:rise .26s cubic-bezier(.2,.8,.2,1);
  }
  @media(min-width:600px){
    .overlay{align-items:center;}
    .sheet{border-radius:22px;}
  }
  @keyframes rise{from{transform:translateY(40px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:10px auto 16px;}
  .sheet h2{font-size:18px;font-weight:800;margin-bottom:2px;}
  .sheet .sub{font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;}

  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-dim);margin-bottom:6px;font-weight:600;}
  .field label .opt{color:var(--ink-faint);font-weight:400;}
  .field input,.field select,.field textarea{
    width:100%;font-family:var(--cjk);font-size:15px;color:var(--ink);
    background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:11px 13px;outline:none;transition:border-color .14s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
  .field textarea{resize:vertical;min-height:64px;}
  .row2{display:flex;gap:11px;}
  .row2>.field{flex:1;}

  /* segmented status */
  .seg{display:flex;gap:6px;}
  .seg button{
    flex:1;font-family:var(--cjk);font-size:13.5px;font-weight:700;cursor:pointer;
    padding:9px 0;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-dim);transition:all .14s;
  }
  .seg button.act-on{background:var(--green-soft);color:var(--green);border-color:rgba(95,191,122,.4);}
  .seg button.act-rsv{background:var(--amber-soft);color:var(--amber);border-color:rgba(232,161,58,.4);}
  .seg button.act-sold{background:var(--gray-soft);color:var(--ink);border-color:rgba(122,129,141,.5);}

  /* photo picker */
  .photos{display:flex;flex-wrap:wrap;gap:9px;}
  .thumb{
    width:74px;height:74px;border-radius:11px;background:var(--surface2);
    background-size:cover;background-position:center;position:relative;
    border:1px solid var(--line);
  }
  .thumb .cov{
    position:absolute;bottom:3px;left:3px;font-size:9.5px;font-weight:700;
    background:var(--gold);color:#231c08;padding:1px 6px;border-radius:5px;
  }
  .thumb .x{
    position:absolute;top:-7px;right:-7px;width:21px;height:21px;border-radius:50%;
    background:var(--red);color:#fff;border:2px solid var(--bg2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;
  }
  .thumb.setcov{cursor:pointer;}
  .addph{
    width:74px;height:74px;border-radius:11px;border:1.5px dashed var(--line);
    background:transparent;color:var(--ink-faint);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:11px;transition:all .14s;
  }
  .addph:hover{border-color:var(--gold);color:var(--gold);}
  .addph svg{width:19px;height:19px;}
  .hint{font-size:11.5px;color:var(--ink-faint);margin-top:8px;line-height:1.5;}

  .savebar{display:flex;gap:11px;margin-top:24px;}
  .btn-ghost{flex:0 0 auto;background:var(--surface);color:var(--ink-dim);border:1px solid var(--line);padding:13px 20px;}
  .btn-ghost:hover{color:var(--ink);}
  .btn-save{flex:1;background:var(--gold);color:#231c08;padding:13px;}
  .btn-save:hover{filter:brightness(1.06);}

  /* toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green);color:#0c2113;font-weight:700;font-size:14px;
    padding:12px 22px;border-radius:12px;z-index:99;opacity:0;pointer-events:none;
    transition:all .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .empty-list{text-align:center;padding:60px 0;color:var(--ink-faint);}
  .empty-list svg{width:42px;height:42px;opacity:.4;margin-bottom:12px;}
</style>
</head>

<div class="demo">⚠️ <b>演示版</b> · 数据只在本页内存里，刷新即还原 · 不连任何真实网站</div>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="ey">SHUAIBAOHANG</span>
      <h1>帅宝行<b>名车</b> · 车源后台</h1>
    </div>
    <button class="btn btn-gold" onclick="openForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      添加车辆
    </button>
  </header>

  <div class="stats">
    <div class="stat s-on"><div class="n" id="stOn">0</div><div class="l">在售</div></div>
    <div class="stat s-rsv"><div class="n" id="stRsv">0</div><div class="l">已订</div></div>
    <div class="stat s-sold"><div class="n" id="stSold">0</div><div class="l">已售</div></div>
  </div>

  <div class="addbar"><span class="ttl">当前车源</span></div>
  <div class="grid" id="grid"></div>

</div>

<!-- form sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="grab"></div>
    <h2 id="formTitle">添加车辆</h2>
    <div class="sub">填好资料 → 选照片 → 保存，客户那一面会自动更新（正式版）</div>

    <div class="field">
      <label>车型全称</label>
      <input id="fName" placeholder="奔驰 GLC260L 4MATIC 动感型">
    </div>

    <div class="row2">
      <div class="field"><label>上牌时间</label><input id="fYear" placeholder="2019年6月"></div>
      <div class="field"><label>表显里程 <span class="opt">万公里</span></label><input id="fKm" type="number" step="0.1" placeholder="6.8"></div>
    </div>

    <div class="row2">
      <div class="field"><label>排量</label><input id="fDisp" placeholder="2.0T"></div>
      <div class="field"><label>变速箱</label>
        <select id="fGear"><option>自动</option><option>手动</option><option>双离合</option><option>CVT</option></select>
      </div>
    </div>

    <div class="row2">
      <div class="field"><label>过户次数</label><input id="fTransfer" type="number" placeholder="1"></div>
      <div class="field"><label>价格 <span class="opt">万元</span></label><input id="fPrice" type="number" step="0.1" placeholder="23.8"></div>
    </div>

    <div class="field">
      <label>状态</label>
      <div class="seg" id="segStatus">
        <button data-s="on" onclick="setStatus('on')">在售</button>
        <button data-s="rsv" onclick="setStatus('rsv')">已订</button>
        <button data-s="sold" onclick="setStatus('sold')">已售</button>
      </div>
    </div>

    <div class="field">
      <label>亮点描述 <span class="opt">选填</span></label>
      <textarea id="fNote" placeholder="一手个人车，全程4S保养，无事故无泡水，原厂漆..."></textarea>
    </div>

    <div class="field">
      <label>照片 <span class="opt">第一张为封面，点其它图可设为封面</span></label>
      <div class="photos" id="photos">
        <button class="addph" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          加图
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">
      <div class="hint">正式版里，手机选图后会自动压缩再上传，不会让网页变慢。</div>
    </div>

    <div class="savebar">
      <button class="btn btn-ghost" onclick="closeForm()">取消</button>
      <button class="btn btn-save" onclick="saveCar()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- mock inventory (in-memory only) ----
  let cars = [
    { id:1, name:"奔驰 GLC260L 4MATIC 动感型", year:"2019年6月", km:"6.8", disp:"2.0T", gear:"自动", transfer:"1", price:"23.8", status:"on", note:"一手个人车，全程4S保养，无事故无泡水。", photos:[] },
    { id:2, name:"宝马 530Li 豪华套装", year:"2020年3月", km:"4.2", disp:"2.0T", gear:"自动", transfer:"0", price:"29.5", status:"rsv", note:"准新车，原版原漆，配置拉满。", photos:[] },
    { id:3, name:"奥迪 A6L 45 TFSI 臻选", year:"2018年9月", km:"9.1", disp:"2.0T", gear:"双离合", transfer:"1", price:"19.6", status:"sold", note:"", photos:[] },
  ];
  let nextId = 4;
  let editingId = null;
  let formStatus = "on";
  let formPhotos = [];

  const $ = s => document.querySelector(s);
  const statusMap = {on:{cls:"on",label:"在售"}, rsv:{cls:"rsv",label:"已订"}, sold:{cls:"sold",label:"已售"}};

  function render(){
    const g = $("#grid");
    $("#stOn").textContent = cars.filter(c=>c.status==="on").length;
    $("#stRsv").textContent = cars.filter(c=>c.status==="rsv").length;
    $("#stSold").textContent = cars.filter(c=>c.status==="sold").length;

    if(cars.length===0){
      g.innerHTML = `<div class="empty-list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 11l1.5-4.5A2 2 0 018.4 5h7.2a2 2 0 011.9 1.5L19 11m-14 0h14m-14 0v6m14-6v6M7 17h.01M17 17h.01"/></svg><div>还没有车，点右上角「添加车辆」</div></div>`;
      return;
    }
    g.innerHTML = cars.map(c=>{
      const st = statusMap[c.status];
      const cover = c.photos[0];
      const ph = cover
        ? `<div class="ph" style="background-image:url('${cover}')"><span class="badge ${st.cls}">${st.label}</span></div>`
        : `<div class="ph empty"><span class="badge ${st.cls}">${st.label}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.5"/><path d="m21 16-5-5L5 19"/></svg></div>`;
      const specs = [c.year, c.km?c.km+"万公里":"", c.disp, c.gear, c.transfer!==""?"过户"+c.transfer+"次":""]
        .filter(Boolean).map(s=>`<span class="spec">${s}</span>`).join("");
      return `<div class="car ${c.status==='sold'?'sold':''}">
        ${ph}
        <div class="body">
          <div class="name">${c.name||"未命名车型"}</div>
          <div class="specs">${specs}</div>
          <div class="foot">
            <div class="price">${c.price||"—"}<small>万</small></div>
            <div class="acts">
              <button class="icbtn" title="编辑" onclick="openForm(${c.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
              <button class="icbtn del" title="删除" onclick="delCar(${c.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  function setStatus(s){
    formStatus = s;
    document.querySelectorAll("#segStatus button").forEach(b=>{
      b.className = b.dataset.s===s ? "act-"+s : "";
    });
  }

  function openForm(id){
    editingId = id ?? null;
    formPhotos = [];
    if(id){
      const c = cars.find(x=>x.id===id);
      $("#formTitle").textContent = "编辑车辆";
      $("#fName").value=c.name; $("#fYear").value=c.year; $("#fKm").value=c.km;
      $("#fDisp").value=c.disp; $("#fGear").value=c.gear; $("#fTransfer").value=c.transfer;
      $("#fPrice").value=c.price; $("#fNote").value=c.note;
      formPhotos = [...c.photos];
      setStatus(c.status);
    } else {
      $("#formTitle").textContent = "添加车辆";
      ["fName","fYear","fKm","fDisp","fTransfer","fPrice","fNote"].forEach(k=>$("#"+k).value="");
      $("#fGear").value="自动";
      setStatus("on");
    }
    renderPhotos();
    $("#overlay").classList.add("show");
  }
  function closeForm(){ $("#overlay").classList.remove("show"); }

  function addPhotos(e){
    [...e.target.files].forEach(f=>{
      const r = new FileReader();
      r.onload = ev => { formPhotos.push(ev.target.result); renderPhotos(); };
      r.readAsDataURL(f);
    });
    e.target.value="";
  }
  function renderPhotos(){
    const box = $("#photos");
    const add = `<button class="addph" onclick="document.getElementById('fileInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>加图</button>`;
    box.innerHTML = formPhotos.map((p,i)=>`
      <div class="thumb setcov" style="background-image:url('${p}')" onclick="makeCover(${i})">
        ${i===0?'<span class="cov">封面</span>':''}
        <span class="x" onclick="event.stopPropagation();rmPhoto(${i})">×</span>
      </div>`).join("") + add;
  }
  function makeCover(i){ if(i===0)return; const [p]=formPhotos.splice(i,1); formPhotos.unshift(p); renderPhotos(); }
  function rmPhoto(i){ formPhotos.splice(i,1); renderPhotos(); }

  function saveCar(){
    const data = {
      name:$("#fName").value.trim(), year:$("#fYear").value.trim(), km:$("#fKm").value.trim(),
      disp:$("#fDisp").value.trim(), gear:$("#fGear").value, transfer:$("#fTransfer").value.trim(),
      price:$("#fPrice").value.trim(), note:$("#fNote").value.trim(), status:formStatus, photos:[...formPhotos]
    };
    if(!data.name){ toast("先填车型全称",1); return; }
    if(editingId){
      const i = cars.findIndex(x=>x.id===editingId);
      cars[i] = {...cars[i], ...data};
      toast("已更新");
    } else {
      cars.unshift({id:nextId++, ...data});
      toast("已添加");
    }
    closeForm(); render();
  }

  function delCar(id){
    const c = cars.find(x=>x.id===id);
    if(confirm(`确定删除「${c.name}」？`)){ cars = cars.filter(x=>x.id!==id); render(); toast("已删除"); }
  }

  let toastTimer;
  function toast(msg){
    const t=$("#toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
  }

  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeForm(); });
  render();
</script>
</body>
</html>
